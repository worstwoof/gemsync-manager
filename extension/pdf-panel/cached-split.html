<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GemSync Cached Gemini</title>
    <link rel="stylesheet" href="./vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="./cached-split.css?v=interactive-cache-2" />
  </head>
  <body>
    <main class="split-shell">
      <section class="gemini-pane" aria-label="本地 Gemini 全记录">
        <div class="top-loader" aria-hidden="true"></div>

        <aside class="gemini-sidebar" aria-label="记录侧栏">
          <section class="recent-block" aria-label="记录列表">
            <div id="recentList" class="recent-list"></div>
          </section>

          <div class="sidebar-bottom">
            <button id="themeToggle" type="button" class="theme-toggle" aria-pressed="false" aria-label="切换明暗色">
              <span id="themeIcon" class="nav-icon">◐</span>
              <span id="themeText" class="sr-only">暗色模式</span>
            </button>
          </div>
        </aside>

        <section class="chat-pane">
          <header class="chat-head">
            <div class="brand-lockup">
              <h1 id="chatTitle">Gemini 全记录缓存</h1>
              <span>Gemini 原始对话缓存 · 不总结，不改写</span>
            </div>
            <div class="chat-actions">
              <span id="recordCount" class="record-count">0 条记录</span>
              <button id="openLiveGemini" type="button">打开原 Gemini</button>
            </div>
          </header>

          <div id="chatScroll" class="chat-scroll"></div>
        </section>
      </section>

      <section class="pdf-pane" aria-label="PDF 面板">
        <iframe id="pdfFrame" title="PDF 同步面板"></iframe>
      </section>
    </main>

    <script src="./vendor/marked/marked.umd.js"></script>
    <script src="./vendor/katex/katex.min.js"></script>
    <script type="module" src="./cached-split.js?v=anchor-sync-1"></script>
  </body>
</html>
